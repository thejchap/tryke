- name: "area: runner"
  color: 006b75
  description: crates/tryke_runner — worker pool, scheduling

- name: "area: reporter"
  color: 006b75
  description: crates/tryke_reporter — output formats

- name: "area: config"
  color: 006b75
  description: crates/tryke_config — pyproject and CLI flag parsing

- name: "area: server"
  color: 006b75
  description: crates/tryke_server — watch mode and hot reload

- name: "area: expect"
  color: 006b75
  description: python/tryke/expect.py — assertion API and matchers

- name: "area: hooks"
  color: 006b75
  description: python/tryke/hooks.py — fixtures and dependency injection

- name: "area: worker"
  color: 006b75
  description: python/tryke/worker.py — Python test runtime

- name: "area: docs"
  color: 006b75
  description: tryke.dev site and top-level README

- name: "area: benchmarks"
  color: 006b75
  description: benchmarks/ suite and tooling

- name: "area: ide"
  color: 006b75
  description: Core-side changes that affect IDE plugins (VS Code, neotest, ...)

- name: "area: pytest-compat"
  color: 006b75
  description: pytest parity and migration gaps

