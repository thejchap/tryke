name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  cli-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo run -p tryke_dev --bin generate-cli-docs -- --check

  benchmark-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run python benchmarks/summarize.py --check

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run ruff check
      - run: uv run ruff format --check

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run ty check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # 3.15 is in alpha through mid-2026; setup-python needs an
          # explicit opt-in before it'll hand us pre-release builds.
          allow-prereleases: true
      - run: rustup show
      - uses: Swatinem/rust-cache@v2.8.2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo build --verbose
      - run: cargo nextest run --workspace --all-features
      - run: cargo run -- test

  ci:
    if: always()
    needs: [fmt, clippy, cli-docs, benchmark-docs, ruff, ty, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
