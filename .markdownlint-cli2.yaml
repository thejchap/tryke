config:
  MD013: false
  # Fenced code blocks throughout the docs. Admonition bodies (``!!! tip``)
  # use 4-space indents that would otherwise register as implicit indented
  # code blocks and flip this rule into "mixed" mode.
  MD046:
    style: fenced
  MD033:
    allowed_elements:
      - a
      - article
      - code
      - div
      - h1
      - h2
      - img
      - li
      - p
      - span
      - ul
      - video
  MD041: false
  MD024:
    siblings_only: true
