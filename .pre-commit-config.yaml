fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: rust-linting
        name: rust linting
        entry: cargo fmt --all --
        types: [file, rust]
        language: system
      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: generate-cli-docs
        name: generate cli docs
        entry: cargo run -p tryke_dev --bin generate-cli-docs --
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: generate-benchmark-docs
        name: generate benchmark docs
        entry: uv run python benchmarks/summarize.py
        files: ^(benchmarks/(summarize\.py|results/.*\.json)|docs/benchmarks\.md)$
        pass_filenames: false
        language: system
      - id: generate-reporter-examples
        name: generate reporter examples
        entry: uv run python scripts/generate_reporter_examples.py
        files: ^(crates/tryke_reporter/.*|demo/sample\.py|scripts/generate_reporter_examples\.py|docs/(guides/reporters|index)\.md|README\.md)$
        pass_filenames: false
        language: system
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: node
        types: [markdown]
        additional_dependencies: ['markdownlint-cli2@0.17.2']
        exclude: ^(docs/cli\.md|docs/benchmarks\.md|benchmarks/RESULTS\.md)$
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        pass_filenames: false
        types: [python]
        language: system
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        pass_filenames: false
        types: [python]
        language: system
      - id: ty-check
        name: ty check
        entry: uv run ty check
        pass_filenames: false
        types: [python]
        language: system
