fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: rust-linting
        name: rust linting
        entry: cargo fmt --all --
        types: [file, rust]
        language: system
      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: generate-cli-docs
        name: generate cli docs
        entry: cargo run -p tryke_dev --bin generate-cli-docs --
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: node
        types: [markdown]
        additional_dependencies: ['markdownlint-cli2@0.17.2']
        exclude: ^docs/cli\.md$
      - id: eslint
        name: eslint
        entry: eslint
        args: [--config, playground/eslint.config.cjs]
        files: ^playground/src/.*\.(ts|tsx)$
        language: node
        additional_dependencies:
          - eslint@10.4.0
          - typescript-eslint@8.59.3
          - '@eslint/js@10.0.1'
          - eslint-plugin-react-hooks@7.1.1
          - typescript@5.8.3
      - id: prettier
        name: prettier
        entry: prettier --check
        files: ^playground/src/.*\.(ts|tsx)$
        language: node
        additional_dependencies: ['prettier@3.8.3']
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        pass_filenames: false
        types: [python]
        language: system
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        pass_filenames: false
        types: [python]
        language: system
      - id: ty-check
        name: ty check
        entry: uv run ty check
        pass_filenames: false
        types: [python]
        language: system
