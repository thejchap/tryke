[changelog]
# trim = false so the trailing blank line in the body template is preserved,
# ensuring git-cliff --prepend leaves a blank line before any existing content.
trim = false
body = """{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [unreleased]{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}- {{ commit.message | upper_first }}
{% endfor %}{% if not loop.last %}
{% endif %}{% endfor %}
{% if contributors %}### Contributors

{% for contributor in contributors %}- @{{ contributor.username }}
{% endfor %}{% endif %}
"""

[remote.github]
owner = "thejchap"
repo = "tryke"

[git]
conventional_commits = false
filter_unconventional = false
# Strip everything from the first newline so that subjects wrapped across
# two lines (without the required blank-line separator) still parse correctly.
commit_preprocessors = [
    { pattern = "\\n[\\s\\S]*", replace = "" },
]
# Groups are driven by PR labels, not commit message prefixes.
# Commits without a recognised label are skipped.
commit_parsers = [
    { label = "^enhancement$", group = "Features" },
    { label = "^bug$", group = "Bug Fixes" },
    { label = "^breaking$", group = "Breaking Changes" },
    { label = "^documentation$", group = "Documentation" },
    { label = "^performance$", group = "Performance" },
    { label = "^internal$", skip = true },
    { skip = true },
]
