[project]
name = "tryke"
dynamic = ["version"]
description = "tryke — python testing tool"
readme = "README.md"
authors = [{ name = "Justin Chapman", email = "commonmodestudio@gmail.com" }]
requires-python = ">=3.12"
dependencies = []
keywords = ["testing", "test", "framework", "runner", "assertions"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/thejchap/tryke"
Documentation = "https://thejchap.github.io/tryke/"
Repository = "https://github.com/thejchap/tryke"
"Bug Tracker" = "https://github.com/thejchap/tryke/issues"

[tool.ty.src]
exclude = ["python", "tests", "benchmarks/suites"] # TODO

[tool.ruff]
exclude = ["benchmarks/suites"]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "COM812"]

[tool.maturin]
bindings = "bin"
manifest-path = "crates/tryke/Cargo.toml"
python-source = "python"

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.uv.build-backend]
module-root = "python/tryke"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-xdist>=3.8.0",
    "ruff~=0.15.4",
    "ty~=0.0.19",
    "zensical>=0.0.26",
]
