[project]
site_name = "tryke"
site_url = "https://thejchap.github.io/tryke/"
site_description = "A test framework for Python that is modern, fast, and fun"
site_author = "Justin Chapman"
copyright = "Copyright &copy; 2025 Justin Chapman"
repo_url = "https://github.com/thejchap/tryke"
repo_name = "tryke"
nav = [
  { "Introduction" = "index.md" },
  { "Guides" = [
    "guides/installation.md",
    "guides/running-tests.md",
    "guides/editor-integration.md",
  ] },
  { "Concepts" = [
    "concepts/discovery.md",
  ] },
  { "Reference" = [
    "reference/api.md",
    "reference/cli.md",
  ] },
]

[project.plugins.search]
enabled = true

[project.theme.icon]
repo = "fontawesome/brands/github"
logo = "lucide/list-check"
favicon = "lucide/list-check"

[project.theme]
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.path",
  "search.highlight",
  "toc.integrate",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.expand",
  "navigation.path",
  "toc.follow",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.select",
  "content.code.annotate",

]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/thejchap"

[project.plugins.offline]

[project.plugins.mkdocstrings.handlers.python]
paths = ["python"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_root_full_path = false
members_order = "source"
merge_init_into_class = true
show_signature_annotations = true
separate_signature = true
