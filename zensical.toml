[project]
site_name = "tryke"
site_url = "https://thejchap.github.io/tryke/"
site_description = "A test framework for Python that is modern, fast, and fun"
site_author = "Justin Chapman"
copyright = "Copyright &copy; 2025 Justin Chapman"
repo_url = "https://github.com/thejchap/tryke"
repo_name = "tryke"

nav = [
    { "Home" = "index.md" },
    { "Quick Start" = "quickstart.md" },
    { "CLI Reference" = "cli.md" },
    { "API Reference" = "api.md" },
    { "Migration from pytest" = "migration.md" },
    { "Why tryke?" = "why.md" },
    { "Benchmarks" = "benchmarks.md" },
]

[project.plugins.search]
enabled = true

[project.theme]
features = [
    "navigation.instant",
    "navigation.sections",
    "navigation.path",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "teal"

[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "teal"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["python"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_root_full_path = false
members_order = "source"
merge_init_into_class = true
show_signature_annotations = true
separate_signature = true
